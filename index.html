<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Sběratelská hra s pokladem</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; 
    background-image: url("pozadi.jpg");
    background-size: cover;        /* roztáhne přes celou obrazovku */
    background-position: center;   /* vystředí obrázek */
    background-repeat: no-repeat;  /* nebude se opakovat */
    text-align: center; 
    color: #2c3e50; 
    padding: 20px; }
        .hidden { display: none; }
        .stats { font-size: 1.2rem; font-weight: bold; margin: 10px 0; color: #27ae60; }
        .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: 20px auto; }
        .card { aspect-ratio: 3/4; background: #fff; border-radius: 12px; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .locked { color: #bdc3c7; font-size: 3rem; font-weight: bold; }
        .controls { background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 180px; }
        button { padding: 12px 20px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Styl pro finální odměnu */
        #final-reward { 
            background: #27ae60; color: white; padding: 30px; border-radius: 20px; 
            margin: 30px auto; max-width: 600px; box-shadow: 0 0 30px rgba(39, 174, 96, 0.5);
            animation: celebrate 1s ease infinite alternate;
        }
        @keyframes celebrate { from { transform: scale(1); } to { transform: scale(1.02); } }
        
        .logout-btn { background: #95a5a6; margin-top: 30px; font-size: 0.9rem; opacity: 0.7; }
	.bottom-image {
    display: block;
    margin: 40px auto 0 auto; /* zarovnání na střed */
    max-width: 100%;
}
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Vítej v mezihře prázdninové výzvy</h1>
        <p>Zadejte název svého týmu:</p>
        <input type="text" id="username" placeholder="Název týmu...">
        <button onclick="login()">Vstoupit do hry</button>
	<img src="uvodnifoto.png" alt="Popis obrázku" width="1000" height="600" class="bottom-image">
	<img src="souradnice.png" alt="Popis obrázku" width="1000" height="600" class="bottom-image">
    </div>

    <div id="game-screen" class="hidden">
        <h1>Tým: <span id="display-name"></span></h1>
        <div class="stats" id="counter">Nasbíráno: 0 z 8</div>
        
        <!-- Sekce s pokladem (standardně skrytá) -->
        <div id="final-reward" class="hidden">
            <h2>🎉 GRATULUJEME! 🎉</h2>
            <p>Posbírali jste všechny karty. Tady je váš kód k pokladu:</p>
            <h1 style="font-size: 4rem; letter-spacing: 10px; margin: 10px 0;">ŽROUŤÁK NEŽERE SALÁTY</h1>
            <p><em>(Heslo si dobře zapamatujte!)</em></p>
        </div>

        <div class="controls" id="input-area">
            <input type="text" id="password-input" placeholder="Zadej heslo...">
            <button onclick="checkPassword()">Odemknout</button>
        </div>

        <div id="collection" class="card-container"></div>

        <button class="logout-btn" onclick="logout()">Odhlásit / Přepnout tým</button>
    </div>

    <script>
        // NASTAVENÍ HESEL A OBRÁZKŮ (Soubory 1.jpg až 10.png)
        const gameData = [
            { id: 1, code: "heslo1", img: "1.png" },
            { id: 2, code: "heslo2", img: "2.png" },
            { id: 3, code: "heslo3", img: "3.png" },
            { id: 4, code: "heslo4", img: "4.png" },
            { id: 5, code: "heslo5", img: "5.png" },
            { id: 6, code: "heslo6", img: "6.png" },
            { id: 7, code: "heslo7", img: "7.png" },
            { id: 8, code: "heslo8", img: "8.png" },
            { id: 9, code: "heslo9", img: "9.png" },
            { id: 10, code: "heslo10", img: "10.png" }
        ];

        let currentTeam = "";
        let allTeamsData = JSON.parse(localStorage.getItem('multi_team_saves_v2')) || {};

        function login() {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert("Zadej jméno týmu!");
            currentTeam = name;
            if (!allTeamsData[currentTeam]) allTeamsData[currentTeam] = [];
            document.getElementById('display-name').innerText = currentTeam;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            render();
        }

        function render() {
            const container = document.getElementById('collection');
            container.innerHTML = '';
            const unlocked = allTeamsData[currentTeam];
            const isComplete = unlocked.length === gameData.length;

            gameData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = unlocked.includes(item.id) ? `<img src="${item.img}">` : `<img src="zadnistrana.png">`;
                container.appendChild(div);
            });

            document.getElementById('counter').innerText = `Nasbíráno: ${unlocked.length} z 10`;
            
            // Zobrazení/Skrytí finální odměny a zadávacího pole
            const rewardDiv = document.getElementById('final-reward');
            const inputArea = document.getElementById('input-area');
            
            if (isComplete) {
                rewardDiv.classList.remove('hidden');
                inputArea.classList.add('hidden'); // Skryje políčko, když už je hotovo
            } else {
                rewardDiv.classList.add('hidden');
                inputArea.classList.remove('hidden');
            }
        }

        function checkPassword() {
            const inputField = document.getElementById('password-input');
            const input = inputField.value.trim().toLowerCase();
            const foundItem = gameData.find(d => d.code.toLowerCase() === input);

            if (foundItem) {
                if (!allTeamsData[currentTeam].includes(foundItem.id)) {
                    allTeamsData[currentTeam].push(foundItem.id);
                    localStorage.setItem('multi_team_saves_v2', JSON.stringify(allTeamsData));
                    render();
                } else { alert("Tento obrázek už máte."); }
            } else { alert("Špatné heslo!"); }
            inputField.value = '';
        }

        function logout() {
            currentTeam = "";
            document.getElementById('username').value = "";
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
